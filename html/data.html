
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thống kê</title>
    <style>
        table.b1 th,table.b1 td{border: 1px solid #000}
    </style>
</head>
<body>
    <div style="font-family:'Times New Roman';font-size:13pt">
        <div style="padding:0">
            <div style="text-align:center;font-weight:550">
                <div style="text-transform:uppercase">cộng hòa xã hội chủ nghĩa việt nam</div>
                <div style="margin-top:5px">Độc lập - Tự do - Hạnh phúc</div>
                <div style="text-transform:uppercase;margin-top:20px">bảng kê tổng họ đơn hàng sản xuất ${province}</div>
            </div>
            <div style="margin-top:20px">
                <div style="text-transform:uppercase;font-weight:550">Số: 17</div>
                <div style="text-transform:uppercase;margin-top:5px;font-weight:550">Ngày ${tgPL}</div>
                <div style="margin-top:5px">
                    <table>
                        <thead></thead>
                        <tbody>
                            <tr>
                                <td style="width:175px;font-style:italic">Biển ô tô</td>
                                <td style="text-align:center">${totalOto}</td>
                            </tr>
                            <tr>
                                <td style="width:175px;font-style:italic">Biển XM</td>
                                <td style="text-align:center">${totalXm}</td>
                            </tr>
                            <tr>
                                <td style="width:175px;font-style:italic">Biển RM</td>
                                <td style="text-align:center">${totalRm}</td>
                            </tr>
                            <tr>
                                <td style="width:175px;font-style:italic">Biển CD</td>
                                <td style="text-align:center">${totalCd}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div style="margin-top:20px;font-size:12pt">
                <table class="b1" style="margin-top:50px;width:100%;text-align:center;border:1px solid #000;border-collapse:collapse">
                    <thead>${tableHeader}</thead>
                    <tbody>${orderRows}</tbody>
                </table>
            </div>
            <div style="font-weight:550;margin-top:20px;text-align:right;margin-right:30px">Người lập</div>
        </div>
    </div>
</body>
</html>
